name: NSE Breakout Scanner

on:
  schedule:
    # 9:10 AM IST = 3:40 AM UTC — Pre-market scan
    - cron: '40 3 * * 1-5'
    # 11:00 AM IST = 5:30 AM UTC — Mid-morning breakout check
    - cron: '30 5 * * 1-5'
    # 3:35 PM IST = 10:05 AM UTC — EOD final scan
    - cron: '5 10 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore State Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            watchlist_persistent.json
          key: scanner-state
          restore-keys: |
            scanner-state

      - name: Ensure State File Exists
        run: |
          if [ ! -f watchlist_persistent.json ]; then
            echo '{"watchlist":[],"alerted_today":[],"alerted_date":"","eod_date":""}' > watchlist_persistent.json
          fi

      - name: Run Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 breakout_scanner.py

      - name: Delete Old State Cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache delete scanner-state || true

      - name: Save State Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            watchlist_persistent.json
          key: scanner-state

name: NSE Breakout Scanner

on:
  schedule:
    # Pre-open at 09:10 IST (03:40 UTC) — Mon to Fri
    - cron: '40 3 * * 1-5'
    # Market Open scan at 09:16 IST (03:46 UTC) to allow 1 min for data to stream
    - cron: '46 3 * * 1-5'
    # 5-min candle at 09:21 IST (03:51 UTC)
    - cron: '51 3 * * 1-5'
    # Every 10 minutes during market hours (09:30–15:20 IST = 04:00–09:50 UTC)
    - cron: '*/10 4-9 * * 1-5'
    # Closing scan at 15:30 IST (10:00 UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore State Cache
        uses: actions/cache@v4
        with:
          path: watchlist_persistent.json
          key: state-${{ github.run_number }}
          restore-keys: |
            state-

      - name: Ensure State File Exists
        run: touch watchlist_persistent.json

      - name: Run Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 breakout_scanner.py

name: NSE Breakout Scanner

on:
  schedule:
    # Pre-open at 09:10 IST (03:40 UTC) — Mon to Fri
    - cron: '40 3 * * 1-5'
    # Intraday scanning every 10 mins starting at 09:15 IST (03:45 UTC) to 09:25 IST (03:55 UTC)
    - cron: '45,55 3 * * 1-5'
    # Intraday scanning every 10 mins from 09:35 IST (04:05 UTC) to 15:25 IST (09:55 UTC)
    - cron: '5-55/10 4-9 * * 1-5'
    # End of day scan at 15:30 IST (10:00 UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore State Cache
        uses: actions/cache/restore@v4
        with:
          path: watchlist_persistent.json
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      - name: Ensure State File Exists
        run: touch watchlist_persistent.json

      - name: Run Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 breakout_scanner.py

      - name: Save State Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: watchlist_persistent.json
          key: state-${{ github.run_id }}

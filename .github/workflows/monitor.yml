name: NSE Live Monitor

on:
  schedule:
    # NSE Market Hours: 09:15 to 15:30 IST
    # UTC: 03:45 to 10:00 UTC
    # Runs every 15 minutes during market hours, Monday to Friday
    - cron: '*/15 4-9 * * 1-5'
    - cron: '45 3 * * 1-5' # Catch the 09:15 AM IST open
  workflow_dispatch: # Allows manual run

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # We run the script in standard mode (not --live) 
          # because GitHub Actions handles the scheduling for us.
          python3 swing_screener.py --universe-limit 500 --interval 15m

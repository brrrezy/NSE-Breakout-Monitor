name: NSE Live Monitor

on:
  schedule:
    # NSE Market Hours: 09:15 to 15:30 IST
    # UTC: 03:45 to 10:00 UTC
    # Runs every 10 minutes during market hours, Monday to Friday
    - cron: '*/10 4-9 * * 1-5'
    - cron: '45 3 * * 1-5' # 09:15 AM IST Opening Bell
  workflow_dispatch: # Allows manual run

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Watchlist Cache
        uses: actions/cache@v4
        with:
          path: watchlist_persistent.json
          key: watchlist-${{ github.run_number }}
          restore-keys: |
            watchlist-

      - name: Run Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Ensure the file exists so the cache step doesn't throw a warning.
          touch watchlist_persistent.json
          # Market-wide scan with IST time-awareness and persistent memory.
          python3 swing_screener.py --universe-limit 0 --period 1y --interval 1d --top-n 25
